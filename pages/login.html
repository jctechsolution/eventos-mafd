<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Login da recepção | MAFD Eventos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/login-recepcao.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card" aria-labelledby="login-title">
        <img src="../assets/img/logo-rede-homens.jpeg" alt="Rede de Homens MAFD" />
        <span>ACESSO DA EQUIPE</span>
        <h1 id="login-title">Recepção MAFD Eventos</h1>
        <form id="reception-login-form">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" autocomplete="username" required />
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
          <p id="login-message" role="status" aria-live="polite"></p>
          <button type="submit">Entrar</button>
        </form>
        <p>Área restrita à equipe de recepção.</p>
        <a href="../index.html">Voltar ao evento</a>
      </section>
    </main>
    <script src="../assets/js/config.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="../assets/js/auth-recepcao.js" defer></script>
    <script src="../assets/js/login-recepcao.js" defer></script>
  </body>
</html>
